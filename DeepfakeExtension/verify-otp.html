<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - Deepfake Detector</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-200 flex items-center justify-center min-h-screen font-sans">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Verification</h1>
      <p class="text-gray-400">Enter the 6-digit code sent to your email</p>
    </div>

    <form id="otp-form" class="space-y-6">
      <div>
        <label for="otp" class="block text-sm font-medium text-gray-300 mb-2">OTP Code</label>
        <input type="text" id="otp" name="otp" required maxlength="6"
          class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-center text-2xl tracking-widest"
          placeholder="123456">
      </div>

      <div id="error-message" class="text-red-400 text-sm text-center min-h-[20px]"></div>

      <div>
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 ease-in-out transform hover:scale-105">
          Verify Account
        </button>
      </div>
    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-gray-400">
        Didn't receive code?
        <a href="#" class="font-medium text-blue-400 hover:text-blue-300">Resend</a>
      </p>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');

    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('otp').value;
      const errorMsg = document.getElementById('error-message');

      try {
        const response = await fetch('http://localhost:3000/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        });

        const data = await response.json();

        if (response.ok) {
          alert('Verification Successful! Please log in.');
          window.location.href = 'login.html';
        } else {
          errorMsg.textContent = data.message || 'Verification failed.';
        }
      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'Network error.';
      }
    });
  </script>
</body>

</html>
