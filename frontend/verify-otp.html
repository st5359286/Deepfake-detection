<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Access | Deepfake Detector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: '#0f172a',
            cyan: '#3b82f6',
            neonGreen: '#22c55e',
            alertRed: '#ef4444',
          },
          fontFamily: {
            mono: ['"Inter"', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-void text-gray-300 flex items-center justify-center min-h-screen relative overflow-hidden">

  <!-- Removed scanlines -->

  <div class="glass-panel p-8 w-full max-w-md relative z-10 bg-slate-800 border-slate-700">
    <div class="text-center mb-8 border-b border-gray-700 pb-4">
      <h1 class="text-2xl font-bold text-white mb-1">Two-Factor Authentication</h1>
      <p class="text-sm text-gray-400">Verify your identity to continue</p>
    </div>

    <form id="otp-form" class="space-y-6">
      <div>
        <label for="otp" class="block text-sm font-medium text-gray-300 mb-2">Enter Security Code</label>
        <input type="text" id="otp" name="otp" required maxlength="6"
          class="w-full px-4 py-3 bg-slate-900 border border-slate-600 text-white text-center text-xl tracking-widest rounded-lg focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all placeholder-gray-500"
          placeholder="000000">
      </div>

      <div id="error-message" class="text-red-500 text-xs text-center min-h-[20px] font-bold"></div>

      <div>
        <button type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white w-full py-3 rounded-lg font-bold transition shadow-lg shadow-blue-500/30">
          Verify Access
        </button>
      </div>
    </form>

    <div class="text-center mt-8 pt-4 border-t border-gray-700">
      <p class="text-xs text-gray-500">
        Code missing?
        <a href="#" id="resend-link" class="text-blue-400 ml-1 hover:text-white transition font-medium">
          Resend Code
        </a>
      </p>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');

    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('otp').value;
      const errorMsg = document.getElementById('error-message');

      try {
        const response = await fetch('http://localhost:3000/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        });

        const data = await response.json();

        if (response.ok) {
          // Success animation
          errorMsg.className = "text-green-500 text-xs text-center min-h-[20px] font-bold";
          errorMsg.textContent = "Access Granted. Redirecting...";
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          errorMsg.className = "text-red-500 text-xs text-center min-h-[20px] font-bold";
          errorMsg.textContent = "Error: " + (data.message || 'Verification failed.');
        }
      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'Fatal: Network error.';
      }
    });

    // Handle Resend Link Click
    document.getElementById('resend-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('error-message');

      errorMsg.textContent = 'Sending request...';
      errorMsg.className = 'text-blue-400 text-xs text-center min-h-[20px] font-bold';

      try {
        const response = await fetch('http://localhost:3000/resend-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.ok) {
          errorMsg.textContent = "Code sent. Check inbox.";
          errorMsg.className = 'text-green-500 text-xs text-center min-h-[20px] font-bold';
        } else {
          errorMsg.textContent = "Failed: " + (data.message || 'Failed to resend OTP.');
          errorMsg.className = 'text-red-500 text-xs text-center min-h-[20px] font-bold';
        }
      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'Fatal: Network connection lost.';
        errorMsg.className = 'text-red-500 text-xs text-center min-h-[20px] font-bold';
      }
    });
  </script>
</body>

</html>
