<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Verification - Deepfake Detector</title>
    <link rel="stylesheet" href="modern.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-main);
        }
        
        .doc-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .doc-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
        }
        
        .doc-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        
        .doc-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 48px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .doc-icon {
            font-size: 5rem;
            margin-bottom: 24px;
        }
        
        .doc-title {
            font-size: 1.75rem;
            margin-bottom: 12px;
        }
        
        .doc-desc {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 1.05rem;
        }
        
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 48px;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 24px;
        }
        
        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.04);
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .upload-text {
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="doc-page">
        <header class="doc-header">
            <div class="header-inner">
                <a href="dashboard.html" class="logo">
                    <div class="logo-icon">🔍</div>
                    Deepfake Detector
                </a>
                <a href="dashboard.html" style="color: var(--text-secondary); font-weight: 500;">
                    ← Back to Dashboard
                </a>
            </div>
        </header>
        
        <main class="doc-main">
            <div class="doc-card">
                <div class="doc-icon">📄</div>
                <h1 class="doc-title">Document Verification</h1>
                <p class="doc-desc">
                    Upload identity documents for authenticity verification. Our AI analyzes document features to detect potential forgeries.
                </p>
                
                <div class="upload-zone" onclick="document.querySelector('#docInput').click()">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Click to upload document</div>
                    <div class="upload-hint">Supports: PDF, JPG, PNG (Max 10MB)</div>
                    <input type="file" id="docInput" style="display: none;" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                
                <button class="btn btn-primary" style="width: 100%;">
                    📋 Verify Document
                </button>
            </div>
        </main>
    </div>
</body>
</html>
