<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satyamev Jayate | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0f172a',
                        cyan: '#3b82f6', // Remapped to Blue 500
                        neonGreen: '#22c55e',
                        alertRed: '#ef4444',
                    },
                    fontFamily: {
                        mono: ['"Inter"', 'sans-serif'], // Remapped to Inter
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-void text-gray-300 flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- Removed scanlines -->

    <div
        class="glass-panel p-8 w-full max-w-md relative z-10 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl">
        <div class="text-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold text-white mb-1">Create Account</h1>
            <p class="text-sm text-gray-400">Join the Deepfake Detection Platform</p>
        </div>

        <form id="register-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                <div class="relative">
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-600 text-white rounded-lg focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all placeholder-gray-500"
                        placeholder="Choose a username">
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <div class="relative">
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-600 text-white rounded-lg focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all placeholder-gray-500"
                        placeholder="Enter your email">
                </div>
            </div>

            <div>
                <label for="password"
                    class="block text-xs font-bold text-cyan mb-2 uppercase tracking-wide">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-500">*</span>
                    <input type="password" id="password" name="password" required
                        class="w-full pl-8 pr-4 py-3 bg-black/50 border border-gray-700 text-white font-mono focus:border-cyan focus:outline-none focus:shadow-[0_0_10px_rgba(0,243,255,0.2)] transition-all placeholder-gray-700"
                        placeholder="••••••••">
                </div>
            </div>

            <div id="message-display" class="text-xs text-center min-h-[20px] font-bold"></div>

            <div>
                <button type="submit" class="btn-cyber w-full group">
                    <span class="mr-2 group-hover:animate-pulse">+</span> CREATE_RECORD
                </button>
            </div>
        </form>

        <div class="text-center mt-8 pt-4 border-t border-gray-800">
            <p class="text-xs text-gray-500">
                Existing Identity?
                <a href="/login.html" class="text-cyan ml-2 hover:text-white transition font-bold">
                    [ ACCESS_LOGIN ]
                </a>
            </p>
        </div>
    </div>

    <script src="register.js"></script>
</body>

</html>
