<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Deepfake Detector</title>
    <link rel="stylesheet" href="modern.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%); min-height: 100vh; }
        .auth-brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
        .auth-brand .logo-icon { width: 56px; height: 56px; }
        .auth-brand .logo-text { font-size: 1.75rem; font-weight: 800; color: var(--primary); }
        .password-input-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; }
        .form-input.with-toggle { padding-right: 48px; }
        .alert { padding: 14px 16px; border-radius: var(--radius-md); margin-bottom: 20px; font-weight: 500; display: none; }
        .alert.show { display: block; }
        .alert-error { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
        .alert-success { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand"><div class="logo-icon">🔍</div><span class="logo-text">Deepfake Detector</span></div>
            <div class="auth-header">
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your new password</p>
            </div>
            <div id="errorAlert" class="alert alert-error"></div>
            <div id="successAlert" class="alert alert-success"></div>
            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" class="form-input with-toggle" placeholder="Enter new password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-input with-toggle" placeholder="Confirm new password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
            </form>
            <div class="auth-footer"><a href="login.html">← Back to Login</a></div>
        </div>
    </div>
    <script src="config.js"></script>
    <script>
        function togglePassword(inputId) {
            var input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        var urlParams = new URLSearchParams(window.location.search);
        var token = urlParams.get('token');
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var errorAlert = document.getElementById('errorAlert');
            var successAlert = document.getElementById('successAlert');
            var submitBtn = this.querySelector('button[type="submit"]');
            errorAlert.classList.remove('show');
            successAlert.classList.remove('show');
            if (password !== confirmPassword) { errorAlert.textContent = 'Passwords do not match!'; errorAlert.classList.add('show'); return; }
            if (!token) { errorAlert.textContent = 'Invalid reset token!'; errorAlert.classList.add('show'); return; }
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            try {
                var response = await fetch(window.config.API_URL + '/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, password: password })
                });
                var data = await response.json();
                if (response.ok) { successAlert.textContent = 'Password reset successful! Redirecting...'; successAlert.classList.add('show'); setTimeout(function(){ window.location.href = 'login.html'; }, 2000); }
                else { errorAlert.textContent = data.message || 'Reset failed!'; errorAlert.classList.add('show'); }
            } catch (error) { errorAlert.textContent = 'Connection error. Please try again.'; errorAlert.classList.add('show'); }
            finally { submitBtn.disabled = false; submitBtn.textContent = 'Reset Password'; }
        });
    </script>
</body>
</html>
