<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vastav - Deepfake Detector</title>
    <link rel="stylesheet" href="modern.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--bg-main);
        }
        
        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .page-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .page-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        
        .feature-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 48px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .feature-icon {
            font-size: 5rem;
            margin-bottom: 24px;
        }
        
        .feature-title {
            font-size: 1.75rem;
            margin-bottom: 12px;
        }
        
        .feature-desc {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 1.05rem;
            line-height: 1.7;
        }
        
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <div class="header-inner">
                <a href="dashboard.html" class="logo">
                    <div class="logo-icon">🔍</div>
                    Deepfake Detector
                </a>
                <a href="dashboard.html" style="color: var(--text-secondary); font-weight: 500;">
                    ← Back to Dashboard
                </a>
            </div>
        </header>
        
        <main class="page-main">
            <div class="feature-card">
                <div class="feature-icon">🎭</div>
                <h1 class="feature-title">Vastav Analysis</h1>
                <p class="feature-desc">
                    Analyze Hindi content for authenticity. Vastav (वास्तविक) means "real" in Hindi - 
                    detect manipulated Hindi audio and video content.
                </p>
                
                <div class="btn-group">
                    <a href="scanner.html" class="btn btn-primary">
                        📤 Analyze Content
                    </a>
                    <a href="dashboard.html" class="btn btn-secondary">
                        ← Go Back
                    </a>
                </div>
        </main>
    </div>
</body>
</html>
